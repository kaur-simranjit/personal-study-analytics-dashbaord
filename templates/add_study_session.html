<!DOCTYPE html>
<html>
    <head>
        <title>Add a Study Session</title>
        <style>
            body {
                margin: 0;
                font-family:Arial, Helvetica, sans-serif;
                background-color: #D3D3FF;
                color: #090933;
            }

            .top-bar {
                width: 100%;
                height: 70px;
                background-color: #575799;
                display: flex;
                justify-content: flex-end;
                align-items: center;
                padding: 0 40px;
                box-sizing: border-box;
                margin-top: 15px;
            }

            .top-bar a {
                text-decoration: none;
                background-color: #D3D3FF;
                color: #090933;
                padding: 10px 16px;
                border-radius: 8px;
                margin-left: 12px;
                font-weight: bold;
            }

            .top-bar a:hover {
                background-color: #575799;
                color: white;
            }

            h1 {
                text-align: center;
                margin-top: 50px;
                margin-bottom: 20px;
                font-size: 38px;
                font-weight: 600;
                color: #090933;
                font-family: Georgia, 'Times New Roman', Times, serif;
            }

            .form-container {
                display: flex;
                justify-content: center;
                margin-top: 10px;
            }

            .form-box {
                width: 50%;
                max-width: 600px;
            }

            form {
                display: flex;
                flex-direction: column;
            }

            label {
                font-size: 15px;
                font-weight: 600;
                color: #090933;
                margin-bottom: 4px;
                margin-top: 30px;
            }

            input, select {
                width: 100%;
                padding: 10px 12px;
                border: none;
                border-radius: 10px;
                background-color: white;
                font-size: 14px;
                font-family: Arial, Helvetica, sans-serif;
                box-sizing: border-box;
                box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
            }

            input:focus, select:focus {
                outline: none;
                box-shadow: 0 0 0 2px rgba(31, 61, 43, 0.2)
            }

             input::placeholder {
                color: #bbb;
                font-style: italic;
            }

            .save-btn {
                margin-top: 30px;
                padding: 14px;
                border: none;
                border-radius: 10px;
                background-color: #575799;
                color: white;
                font-size: 16px;
                font-weight: bold;
                cursor: pointer;
            }

            .save-btn:hover {
                background-color: #D3D3FF;
                color: #090933;
            }
        </style>
    </head>
    <body>
        <div class="top-bar">
            <a href="/">Dashboard</a>
            <a href="/view">View Saved Sessions</a>
        </div>

        <h1> Add a Study Session</h1>

        <div class="form-container">
            <div class="form-box">
                <form method="POST">
                    <label>Date</label>
                    <input type="date" name="date" required>

                    <label>Course Studied</label>
                    <input type="text" name="course_studied" placeholder="Eg. Statistics" required>

                    <label>Study Method</label>
                    <select name="study_method" required>
                        <option value="Reading/Notes">Reading/Notes</option>
                        <option value="Watch Tutorials">Watch Tutorials</option>
                        <option value="Practice">Practice</option>
                        <option value="Revision">Revision</option>
                    </select>

                    <label>Number of Hours Studied</label>
                    <input type="number" name="study_hours" step="0.1" min="0" placeholder="Eg. 0.5" required>

                    <label>Break Time (in minutes)</label>
                    <input type="number" name="break_time" min="0" placeholder="Eg. 10" required>

                    <label>Productivity Rating (1-5)</label>
                    <input type="number" name="productivity_rating" min="1" max="5" placeholder="Eg. 3" required>

                    <button type="submit" class="save-btn">Save</button>
                </form>
            </div>
        </div>
    </body>
</html>
